<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>脉诊分析助手 | 本味汤膳</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #C0392B;
    --primary-light: #E74C3C;
    --prim-bg: #FFF8F0;
    --accent: #E67E22;
    --card-bg: #FFF8F0;
    --text: #3E2723;
    --text-light: #6D4C41;
    --shadow: 0 2px 12px rgba(192,57,43,0.12);
    --radius: 14px;
    --green: #27AE60;
    --blue: #2980B9;
    --gold: #F39C12;
  }
  body {
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    background: var(--prim-bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 100px;
  }
  .header {
    background: linear-gradient(135deg, #C0392B 0%, #E67E22 100%);
    color: #fff;
    text-align: center;
    padding: 18px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header .title { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
  .header .sub {
    font-size: 12px;
    opacity: .85;
    margin-top: 3px;
    letter-spacing: 2px;
  }
  .container { max-width: 640px; margin: 0 auto; padding: 16px; }

  /* ===== Patient Bar ===== */
  .patient-bar {
    background: #fff;
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .patient-bar .label { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; }
  .patient-bar select {
    flex: 1;
    min-width: 100px;
    padding: 7px 10px;
    border: 1.5px solid #E8D5C0;
    border-radius: 8px;
    font-size: 14px;
    background: #fff;
    color: var(--text);
    outline: none;
  }
  .patient-bar .btn-sm {
    padding: 7px 14px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s;
  }
  .patient-bar .btn-sm:active { transform: scale(.95); }
  .btn-sm.add { background: var(--green); color: #fff; }
  .btn-sm.del { background: #E8D5C0; color: var(--text); }
  .btn-sm.hist { background: var(--blue); color: #fff; }

  /* ===== Section Common ===== */
  .section-card {
    background: #fff;
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .section-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-title .badge {
    font-size: 11px;
    font-weight: 400;
    background: var(--prim-bg);
    color: var(--text-light);
    padding: 1px 10px;
    border-radius: 10px;
    margin-left: auto;
  }

  /* ===== Pulse ===== */
  .hand-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .hand-title.left { color: var(--primary); }
  .hand-title.right { color: var(--blue); }

  .pulse-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .pulse-card {
    background: var(--prim-bg);
    border-radius: 10px;
    padding: 10px;
    text-align: center;
    border: 1.5px solid #E8D5C0;
  }
  .pulse-card .pos-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 3px;
  }
  .pulse-card .pos-organ {
    font-size: 11px;
    color: var(--text-light);
    margin-bottom: 8px;
  }
  .pulse-card select {
    width: 100%;
    padding: 6px 4px;
    border: 1.5px solid #E8D5C0;
    border-radius: 8px;
    font-size: 13px;
    background: #fff;
    color: var(--text);
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    text-align: center;
    text-align-last: center;
  }
  .pulse-card select:focus { border-color: var(--primary); }

  /* ===== Tongue / Symptom Grids ===== */
  .sel-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .sel-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .sel-item {
    background: var(--prim-bg);
    border-radius: 10px;
    padding: 10px 8px;
    border: 1.5px solid #E8D5C0;
  }
  .sel-item .sel-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 5px;
  }
  .sel-item select {
    width: 100%;
    padding: 5px 4px;
    border: 1.5px solid #E8D5C0;
    border-radius: 8px;
    font-size: 12px;
    background: #fff;
    color: var(--text);
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    text-align: center;
    text-align-last: center;
  }
  .sel-item select:focus { border-color: var(--accent); }

  /* ===== Symptoms Checkbox ===== */
  .symp-group {
    margin-bottom: 10px;
  }
  .symp-group .group-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .symp-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .symp-grid label {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 5px 10px;
    background: var(--prim-bg);
    border: 1.5px solid #E8D5C0;
    border-radius: 16px;
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
    user-select: none;
  }
  .symp-grid input[type="checkbox"] { display: none; }
  .symp-grid input:checked + span {
    color: #fff;
  }
  .symp-grid input:checked ~ span { color: inherit; }
  .symp-grid label:has(input:checked) {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }

  /* ===== Analyze ===== */
  .btn-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 8px 0 20px;
    flex-wrap: wrap;
  }
  .btn-analyze {
    padding: 14px 48px;
    border: none;
    border-radius: 28px;
    background: linear-gradient(135deg, #C0392B, #E67E22);
    color: #fff;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    box-shadow: 0 3px 12px rgba(192,57,43,0.3);
    letter-spacing: 2px;
    flex: 1;
    max-width: 260px;
  }
  .btn-analyze:active { transform: scale(.96); }
  .btn-reset {
    padding: 14px 24px;
    border: 1.5px solid #E8D5C0;
    border-radius: 28px;
    background: #fff;
    color: var(--text-light);
    font-size: 14px;
    cursor: pointer;
  }

  /* ===== Result ===== */
  .result-area { display: none; }
  .result-area.show { display: block; animation: fadeUp .3s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .result-section {
    background: #fff;
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
    border-left: 4px solid var(--accent);
  }
  .result-section.green { border-left-color: var(--green); }
  .result-section.blue { border-left-color: var(--blue); }
  .result-section h3 {
    font-size: 15px;
    color: var(--primary);
    margin-bottom: 6px;
  }
  .result-section .summary {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
  }
  .result-section .summary .tag {
    display: inline-block;
    padding: 1px 10px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
    margin: 2px 2px;
  }
  .tag.def { background: #E8F5E9; color: #2E7D32; }
  .tag.exc { background: #FBE9E7; color: #BF360C; }
  .tag.mix { background: #FFF3E0; color: #E65100; }

  .pos-analysis {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }
  .pos-analysis .item {
    padding: 8px 10px;
    background: var(--prim-bg);
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.6;
  }
  .pos-analysis .item .label { font-weight: 600; color: var(--primary); }

  .rec-card {
    padding: 10px 12px;
    background: var(--prim-bg);
    border-radius: 10px;
    margin-bottom: 8px;
    font-size: 13px;
    line-height: 1.6;
  }
  .rec-card .rec-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--primary);
  }
  .rec-card .rec-comp {
    font-size: 12px;
    color: var(--text-light);
    margin: 3px 0;
  }

  .empty-result {
    text-align: center;
    padding: 30px;
    color: var(--text-light);
  }
  .empty-result .icon { font-size: 36px; }

  .disclaimer {
    background: #FFF8E1;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12px;
    color: #8D6E63;
    line-height: 1.6;
    margin-top: 12px;
  }
  .disclaimer b { color: var(--primary); }

  /* ===== Modal ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: #fff;
    border-radius: 16px;
    padding: 20px;
    width: 90%;
    max-width: 360px;
    box-shadow: 0 8px 30px rgba(0,0,0,.2);
  }
  .modal-box h3 { font-size: 17px; margin-bottom: 14px; text-align: center; }
  .modal-box input, .modal-box select {
    width: 100%;
    padding: 10px;
    border: 1.5px solid #E8D5C0;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 10px;
    outline: none;
  }
  .modal-box input:focus { border-color: var(--primary); }
  .modal-btn-row { display: flex; gap: 10px; margin-top: 8px; }
  .modal-btn-row button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .modal-btn-row .ok { background: var(--primary); color: #fff; }
  .modal-btn-row .cancel { background: #E8D5C0; color: var(--text); }

  /* ===== History ===== */
  .history-list { max-height: 400px; overflow-y: auto; }
  .history-item {
    padding: 10px 12px;
    border-bottom: 1px solid #F0E0D0;
    font-size: 13px;
    line-height: 1.5;
  }
  .history-item:last-child { border: none; }
  .history-item .h-date { font-size: 11px; color: var(--text-light); }
  .history-item .h-summary { margin-top: 3px; }

  @media (max-width: 400px) {
    .pulse-card { padding: 8px 6px; }
    .pulse-card .pos-name { font-size: 14px; }
    .pulse-card select { font-size: 12px; }
    .pos-analysis { grid-template-columns: 1fr; }
    .sel-grid { grid-template-columns: 1fr; }
    .sel-grid.three { grid-template-columns: 1fr; }
    .patient-bar { flex-direction: column; align-items: stretch; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="title">🩺 脉诊分析助手</div>
  <div class="sub">辨脉象 · 看舌苔 · 问症状 · 知调养</div>
</div>

<div class="container">

  <!-- ===== Patient Bar ===== -->
  <div class="patient-bar">
    <span class="label">👤 患者</span>
    <select id="patientSelect" onchange="switchPatient(this.value)">
      <option value="__new">— 请选择或新建患者 —</option>
    </select>
    <button class="btn-sm add" onclick="showNewPatientModal()">➕ 新建</button>
    <button class="btn-sm del" onclick="deletePatient()">🗑️ 删除</button>
    <button class="btn-sm hist" onclick="showHistory()">📋 记录</button>
  </div>

  <!-- ===== Pulse Section ===== -->
  <div class="section-card" style="padding-bottom:8px;">
    <div class="section-title">
      <span>✋ 脉象诊断</span>
      <span class="badge">六部合参</span>
    </div>

    <!-- Left Hand -->
    <div class="hand-title left">✋ 左手</div>
    <div class="pulse-grid">
      <div class="pulse-card">
        <div class="pos-name">寸 脉</div>
        <div class="pos-organ">心 · 小肠</div>
        <select id="left-cun">
          <option value="">— 选脉象 —</option>
          <option value="normal">平脉 (正常)</option>
          <option value="fu">浮脉</option><option value="chen">沉脉</option><option value="chi">迟脉</option>
          <option value="shuo">数脉</option><option value="hua">滑脉</option><option value="se">涩脉</option>
          <option value="xian">弦脉</option><option value="xi">细脉</option><option value="hong">洪脉</option>
          <option value="ru">濡脉</option><option value="ruo">弱脉</option><option value="jin">紧脉</option>
          <option value="huan">缓脉</option><option value="jie">结脉</option><option value="dai">代脉</option>
          <option value="cu">促脉</option>
        </select>
      </div>
      <div class="pulse-card">
        <div class="pos-name">关 脉</div>
        <div class="pos-organ">肝 · 胆</div>
        <select id="left-guan">
          <option value="">— 选脉象 —</option>
          <option value="normal">平脉 (正常)</option>
          <option value="fu">浮脉</option><option value="chen">沉脉</option><option value="chi">迟脉</option>
          <option value="shuo">数脉</option><option value="hua">滑脉</option><option value="se">涩脉</option>
          <option value="xian">弦脉</option><option value="xi">细脉</option><option value="hong">洪脉</option>
          <option value="ru">濡脉</option><option value="ruo">弱脉</option><option value="jin">紧脉</option>
          <option value="huan">缓脉</option><option value="jie">结脉</option><option value="dai">代脉</option>
          <option value="cu">促脉</option>
        </select>
      </div>
      <div class="pulse-card">
        <div class="pos-name">尺 脉</div>
        <div class="pos-organ">肾 · 膀胱</div>
        <select id="left-chi">
          <option value="">— 选脉象 —</option>
          <option value="normal">平脉 (正常)</option>
          <option value="fu">浮脉</option><option value="chen">沉脉</option><option value="chi">迟脉</option>
          <option value="shuo">数脉</option><option value="hua">滑脉</option><option value="se">涩脉</option>
          <option value="xian">弦脉</option><option value="xi">细脉</option><option value="hong">洪脉</option>
          <option value="ru">濡脉</option><option value="ruo">弱脉</option><option value="jin">紧脉</option>
          <option value="huan">缓脉</option><option value="jie">结脉</option><option value="dai">代脉</option>
          <option value="cu">促脉</option>
        </select>
      </div>
    </div>

    <!-- Right Hand -->
    <div class="hand-title right" style="margin-top:12px;">🤚 右手</div>
    <div class="pulse-grid">
      <div class="pulse-card">
        <div class="pos-name">寸 脉</div>
        <div class="pos-organ">肺 · 大肠</div>
        <select id="right-cun">
          <option value="">— 选脉象 —</option>
          <option value="normal">平脉 (正常)</option>
          <option value="fu">浮脉</option><option value="chen">沉脉</option><option value="chi">迟脉</option>
          <option value="shuo">数脉</option><option value="hua">滑脉</option><option value="se">涩脉</option>
          <option value="xian">弦脉</option><option value="xi">细脉</option><option value="hong">洪脉</option>
          <option value="ru">濡脉</option><option value="ruo">弱脉</option><option value="jin">紧脉</option>
          <option value="huan">缓脉</option><option value="jie">结脉</option><option value="dai">代脉</option>
          <option value="cu">促脉</option>
        </select>
      </div>
      <div class="pulse-card">
        <div class="pos-name">关 脉</div>
        <div class="pos-organ">脾 · 胃</div>
        <select id="right-guan">
          <option value="">— 选脉象 —</option>
          <option value="normal">平脉 (正常)</option>
          <option value="fu">浮脉</option><option value="chen">沉脉</option><option value="chi">迟脉</option>
          <option value="shuo">数脉</option><option value="hua">滑脉</option><option value="se">涩脉</option>
          <option value="xian">弦脉</option><option value="xi">细脉</option><option value="hong">洪脉</option>
          <option value="ru">濡脉</option><option value="ruo">弱脉</option><option value="jin">紧脉</option>
          <option value="huan">缓脉</option><option value="jie">结脉</option><option value="dai">代脉</option>
          <option value="cu">促脉</option>
        </select>
      </div>
      <div class="pulse-card">
        <div class="pos-name">尺 脉</div>
        <div class="pos-organ">命门 · 肾阳</div>
        <select id="right-chi">
          <option value="">— 选脉象 —</option>
          <option value="normal">平脉 (正常)</option>
          <option value="fu">浮脉</option><option value="chen">沉脉</option><option value="chi">迟脉</option>
          <option value="shuo">数脉</option><option value="hua">滑脉</option><option value="se">涩脉</option>
          <option value="xian">弦脉</option><option value="xi">细脉</option><option value="hong">洪脉</option>
          <option value="ru">濡脉</option><option value="ruo">弱脉</option><option value="jin">紧脉</option>
          <option value="huan">缓脉</option><option value="jie">结脉</option><option value="dai">代脉</option>
          <option value="cu">促脉</option>
        </select>
      </div>
    </div>
  </div>

  <!-- ===== Tongue Section (B1) ===== -->
  <div class="section-card">
    <div class="section-title">
      <span>👅 舌诊</span>
      <span class="badge">望舌辨症</span>
    </div>
    <div class="sel-grid">
      <div class="sel-item">
        <div class="sel-label">舌色</div>
        <select id="tongue-color">
          <option value="">— 未选 —</option>
          <option value="pale">淡白舌 (气血虚/阳虚)</option>
          <option value="light-red">淡红舌 (正常)</option>
          <option value="red">红舌 (热证)</option>
          <option value="crimson">绛舌 (热盛/阴虚火旺)</option>
          <option value="purple">紫舌 (血瘀/热极)</option>
          <option value="blue">青舌 (寒凝/血瘀)</option>
        </select>
      </div>
      <div class="sel-item">
        <div class="sel-label">苔色</div>
        <select id="coating-color">
          <option value="">— 未选 —</option>
          <option value="white">白苔 (表证/寒证)</option>
          <option value="yellow">黄苔 (热证/里证)</option>
          <option value="gray">灰苔 (里热/寒湿)</option>
          <option value="black">黑苔 (热极/寒极)</option>
        </select>
      </div>
    </div>
    <div class="sel-grid" style="margin-top:8px;">
      <div class="sel-item">
        <div class="sel-label">苔质</div>
        <select id="coating-quality">
          <option value="">— 未选 —</option>
          <option value="thin">薄苔 (正常/表证)</option>
          <option value="thick">厚苔 (里证/痰湿)</option>
          <option value="greasy">腻苔 (湿浊/痰饮)</option>
          <option value="dry">燥苔 (津亏/热盛)</option>
          <option value="moist">润苔 (正常/湿证)</option>
          <option value="peeled">剥苔 (胃气阴不足)</option>
          <option value="none">无苔 (胃阴大亏)</option>
        </select>
      </div>
      <div class="sel-item">
        <div class="sel-label">舌形</div>
        <select id="tongue-shape">
          <option value="">— 未选 —</option>
          <option value="normal">正常 (适中)</option>
          <option value="swollen">胖大舌 (阳虚水湿)</option>
          <option value="thin">瘦薄舌 (气血阴亏)</option>
          <option value="tooth">齿痕舌 (脾虚湿盛)</option>
          <option value="cracked">裂纹舌 (热盛/阴虚)</option>
          <option value="prickly">芒刺舌 (热盛)</option>
          <option value="ecchymosis">瘀斑舌 (血瘀)</option>
        </select>
      </div>
    </div>
  </div>

  <!-- ===== Symptoms Section (B1) ===== -->
  <div class="section-card">
    <div class="section-title">
      <span>💬 问诊 — 症状勾选</span>
      <span class="badge">可多选</span>
    </div>
    <div id="symptomsArea"></div>
  </div>

  <!-- ===== Actions ===== -->
  <div class="btn-row">
    <button class="btn-analyze" onclick="analyze()">🔍 综合分析</button>
    <button class="btn-reset" onclick="resetAll()">↺ 重置</button>

// ======================== PATIENT MGMT (B2) ========================

function getPatients() {
  try { return JSON.parse(localStorage.getItem('maizhen_patients')) || {}; } catch(e) { return {}; }
}
function savePatients(p) { localStorage.setItem('maizhen_patients', JSON.stringify(p)); }

function getHistory(pid) {
  try { return JSON.parse(localStorage.getItem('maizhen_hist_' + pid)) || []; } catch(e) { return []; }
}
function saveHistory(pid, h) { localStorage.setItem('maizhen_hist_' + pid, JSON.stringify(h)); }

function renderPatientList() {
  const sel = document.getElementById('patientSelect');
  const pts = getPatients();
  const current = sel.dataset.current || '';
  sel.innerHTML = '<option value="__new">— 请选择或新建患者 —</option>';
  Object.keys(pts).sort().forEach(id => {
    const p = pts[id];
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = p.name + (p.gender ? ' · ' + p.gender : '') + (p.age ? ' ' + p.age + '岁' : '');
    sel.appendChild(opt);
  });
  if (current && pts[current]) sel.value = current;
}
function switchPatient(id) {
  document.getElementById('patientSelect').dataset.current = id;
}
function getCurrentPatientId() {
  const v = document.getElementById('patientSelect').value;
  return v === '__new' ? null : v;
}
function getCurrentPatient() {
  const id = getCurrentPatientId();
  if (!id) return null;
  const pts = getPatients();
  return pts[id] || null;
}

function showNewPatientModal() {
  document.getElementById('patientModal').classList.add('show');
  document.getElementById('newPatientName').value = '';
  document.getElementById('newPatientAge').value = '';
}
function hideModal(id) { document.getElementById(id).classList.remove('show'); }

function createPatient() {
  const name = document.getElementById('newPatientName').value.trim();
  if (!name) { alert('请输入患者姓名'); return; }
  const gender = document.getElementById('newPatientGender').value;
  const age = document.getElementById('newPatientAge').value;
  const pts = getPatients();
  const id = 'p_' + Date.now();
  pts[id] = { name, gender, age: age || '', created: Date.now() };
  savePatients(pts);
  renderPatientList();
  document.getElementById('patientSelect').value = id;
  document.getElementById('patientSelect').dataset.current = id;
  hideModal('patientModal');
}

function deletePatient() {
  const id = getCurrentPatientId();
  if (!id) { alert('请先选择患者'); return; }
  const p = getCurrentPatient();
  if (!confirm('确定删除患者「' + p.name + '」及其所有诊断记录吗？')) return;
  const pts = getPatients();
  delete pts[id];
  savePatients(pts);
  localStorage.removeItem('maizhen_hist_' + id);
  renderPatientList();
}

function showHistory() {
  const id = getCurrentPatientId();
  if (!id) { alert('请先选择患者'); return; }
  const hist = getHistory(id);
  const p = getCurrentPatient();
  const el = document.getElementById('historyContent');
  if (hist.length === 0) {
    el.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-light);font-size:14px;">暂无诊断记录</div>';
  } else {
    el.innerHTML = hist.reverse().map((r, i) => {
      const date = new Date(r.time).toLocaleString('zh-CN');
      const summary = r.summary || r.pulseSummary || '脉诊分析';
      return `<div class="history-item">
        <div class="h-date">📅 ${date}</div>
        <div class="h-summary">${summary}</div>
      </div>`;
    }).join('');
  }
  document.getElementById('historyModal').classList.add('show');
}

// ======================== ANALYZE ========================

function analyze() {
  const positions = ['left-cun','left-guan','left-chi','right-cun','right-guan','right-chi'];
  const selects = positions.map(id => ({
    id, value: document.getElementById(id).value,
    name: document.getElementById(id).selectedOptions?.[0]?.text || ''
  }));
  const filled = selects.filter(s => s.value);
  if (filled.length === 0) {
    showResult('<div class="empty-result"><div class="icon">👆</div><p style="font-size:15px;line-height:1.6">请至少选择一个部位的脉象</p></div>');
    return;
  }

  // ---- Collect data ----
  let posDetails = '', allSyndromes = [], pulseTypesUsed = [];

  selects.forEach(s => {
    if (!s.value || s.value === 'normal') return;
    const organ = ORGAN_MAP[s.id];
    const knowledge = PULSE_KNOWLEDGE[s.id]?.[s.value];
    const pulseInfo = PULSE_DESC[s.value];
    if (knowledge && pulseInfo) {
      pulseTypesUsed.push(s.value);
      allSyndromes.push(knowledge.syndrome);
      posDetails += `<div class="item">
        <span class="label">${organ.name}（${organ.organs}）</span><br>
        <b style="color:var(--primary)">${pulseInfo.name}</b> → ${knowledge.syndrome}<br>
        <span style="font-size:11px;color:#999">${knowledge.desc}</span>
      </div>`;
    }
  });
  selects.filter(s => s.value === 'normal').forEach(s => {
    const organ = ORGAN_MAP[s.id];
    posDetails += `<div class="item">
      <span class="label">${organ.name}（${organ.organs}）</span><br>
      <span style="color:#2E7D32;font-weight:600">平脉（正常）</span> → 脉气和缓，脏腑调和
    </div>`;
  });

  // ---- Tongue ----
  const tColor = document.getElementById('tongue-color');
  const tcColor = document.getElementById('coating-color');
  const tcQuality = document.getElementById('coating-quality');
  const tShape = document.getElementById('tongue-shape');
  const tongueData = {
    color: tColor.value ? tColor.options[tColor.selectedIndex].text : '',
    coating: tcColor.value ? tcColor.options[tcColor.selectedIndex].text : '',
    quality: tcQuality.value ? tcQuality.options[tcQuality.selectedIndex].text : '',
    shape: tShape.value ? tShape.options[tShape.selectedIndex].text : '',
  };

  // ---- Symptoms ----
  const symptoms = [];
  document.querySelectorAll('#symptomsArea input[type="checkbox"]:checked').forEach(c => symptoms.push(c.value));

  // ---- Generate analysis ----
  const summary = generateSummary(allSyndromes, pulseTypesUsed, selects, tongueData, symptoms);
  const formulas = generateFormulas(allSyndromes);
  const quickRef = getPulseQuickRef(pulseTypesUsed);

  let html = `
    <div class="result-section">
      <h3>📊 综合分析</h3>
      <div class="summary">${summary}</div>
    </div>`;

  if (posDetails) {
    html += `<div class="result-section">
      <h3>🔬 各部位脉象分析</h3>
      <div class="pos-analysis">${posDetails}</div>
    </div>`;
  }

  if (tongueData.color || tongueData.coating || tongueData.quality || tongueData.shape) {
    html += `<div class="result-section">
      <h3>👅 舌诊参考</h3>
      <div class="summary">${renderTongueAnalysis(tongueData, allSyndromes)}</div>
    </div>`;
  }

  if (symptoms.length > 0) {
    html += `<div class="result-section">
      <h3>💬 问诊 — 已选症状</h3>
      <div class="summary">${symptoms.map(s => `<span class="tag" style="background:#FBE9E7;color:#BF360C">${s}</span>`).join(' ')}</div>
    </div>`;
  }

  if (formulas) {
    html += `<div class="result-section green">
      <h3>🏪 调养方案推荐</h3>
      ${formulas}
      <div style="margin-top:10px;font-size:12px;color:var(--text-light);background:#FFF3E0;padding:10px;border-radius:8px;">
        💡 <b>食疗提示：</b>以上药膳建议可配合「本味汤膳」小程序查询具体制作方法。<br>
        ⚠️ 方剂仅供参考，实际用药请遵医嘱。
      </div>
    </div>`;
  }

  if (quickRef) {
    html += `<div class="result-section blue">
      <h3>📋 脉象速查</h3>
      ${quickRef}
    </div>`;
  }

  showResult(html);

  // ---- Save to history (B2) ----
  const pid = getCurrentPatientId();
  if (pid) {
    const hist = getHistory(pid);
    hist.push({
      time: Date.now(),
      pulseSummary: allSyndromes.length > 0 ? allSyndromes.slice(0,3).join('；') : '平脉',
      summary: '脉象分析：' + (allSyndromes.length > 0 ? allSyndromes.slice(0,4).join('；') : '大致正常'),
      tongue: tongueData,
      symptoms: symptoms
    });
    if (hist.length > 100) hist.splice(0, hist.length - 100);
    saveHistory(pid, hist);
  }
}

function showResult(html) {
  document.getElementById('resultContent').innerHTML = html;
  document.getElementById('resultArea').classList.add('show');
  document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ======================== GENERATE SUMMARY ========================

function generateSummary(syndromes, pulseTypes, selects, tongue, symptoms) {
  if (syndromes.length === 0 && selects.filter(s => s.value).every(s => s.value === 'normal')) {
    return '✅ <b>结论：</b>脉象平和，属正常脉象，提示气血调和、五脏安定。' +
      (tongue.color ? '<br>👅 舌象信息可供参考。' : '') +
      (symptoms.length > 0 ? '<br>💬 如有不适症状，建议结合更多诊法综合判断。' : '');
  }
  if (syndromes.length === 0) {
    return '部分脉位未选或呈平脉，综合判断信息不足，建议结合更多脉位进行整体分析。';
  }

  const defPatterns = ['虚','亏','衰','弱','不足','少'];
  const excPatterns = ['实','盛','亢','火','热','滞','瘀','痰','湿','寒','郁','风'];
  let defCount = 0, excCount = 0;
  syndromes.forEach(s => {
    if (defPatterns.some(p => s.includes(p))) defCount++;
    if (excPatterns.some(p => s.includes(p))) excCount++;
  });

  // Tongue contributes
  const tVal = document.getElementById('tongue-color')?.value;
  if (tVal === 'pale') defCount += 2;
  if (tVal === 'red' || tVal === 'crimson') excCount += 2;
  if (tVal === 'purple') excCount += 1;

  const tcVal = document.getElementById('coating-color')?.value;
  if (tcVal === 'yellow') excCount += 1;
  if (tcVal === 'black') excCount += 2;

  const tShapeVal = document.getElementById('tongue-shape')?.value;
  if (tShapeVal === 'swollen' || tShapeVal === 'tooth') defCount += 1;
  if (tShapeVal === 'thin') defCount += 2;

  let conclusion = '', tagClass = '';
  const total = selects.filter(s => s.value && s.value !== 'normal').length;

  if (defCount > excCount && defCount >= 2) {
    conclusion = '总体以<b>虚证</b>为主，提示脏腑气血阴阳有所不足。建议以扶正补益为调养方向，注意适当休息，避免过劳，配合对应体质的药膳调理。';
    tagClass = 'def';
  } else if (excCount > defCount && excCount >= 2) {
    conclusion = '总体以<b>实证</b>为主，提示体内有邪气停留（热、湿、痰、瘀、寒等）。建议以祛邪为调养方向，饮食清淡，忌辛辣油腻，必要时请中医师辨证施治。';
    tagClass = 'exc';
  } else if (defCount > 0 && excCount > 0) {
    conclusion = '总体呈<b>虚实夹杂</b>之象，既有正气不足，又有邪气留滞。调养上需攻补兼施，建议到中医馆面诊，由专业医师制定个性化方案。';
    tagClass = 'mix';
  } else {
    conclusion = '脉象提示身体存在一定偏差，建议结合舌诊、问诊等其他诊法综合判断。';
  }

  // Pattern notes
  let patternNote = '';
  if (pulseTypes.includes('xian')) patternNote += '⚠️ 弦脉出现，注意<b>情绪管理</b>，避免恼怒焦虑。<br>';
  if (pulseTypes.includes('hua')) patternNote += '⚠️ 滑脉出现，注意<b>饮食清淡</b>，避免肥甘厚味。<br>';
  if (pulseTypes.includes('xi') || pulseTypes.includes('ruo')) patternNote += '⚠️ 细弱脉提示<b>气血不足</b>，注意休息调养，可配合补益药膳。<br>';

  // Symptom matching
  if (symptoms.includes('失眠') && pulseTypes.includes('shuo')) patternNote += '📌 失眠+数脉，提示心火或阴虚内热扰动心神。<br>';
  if (symptoms.includes('乏力') && (pulseTypes.includes('xi') || pulseTypes.includes('ruo'))) patternNote += '📌 乏力+细弱脉，符合气血不足表现。<br>';
  if (symptoms.includes('口干') && (tVal === 'red' || tVal === 'crimson')) patternNote += '📌 口干+红绛舌，提示热盛伤津。<br>';

  return `
    共分析 ${total} 个脉位。涉及证型：${syndromes.join('、')}<br><br>
    🔹 <b>性质判断：</b><span class="tag ${tagClass}">${tagClass === 'def' ? '虚证' : tagClass === 'exc' ? '实证' : tagClass === 'mix' ? '虚实夹杂' : '偏颇'}</span><br>
    ${conclusion}<br>
    ${patternNote ? '<br>' + patternNote : ''}
  `;
}

function renderTongueAnalysis(tongue, syndromes) {
  let lines = [];
  if (tongue.color) lines.push('舌色：' + tongue.color);
  if (tongue.coating) lines.push('苔色：' + tongue.coating);
  if (tongue.quality) lines.push('苔质：' + tongue.quality);
  if (tongue.shape) lines.push('舌形：' + tongue.shape);

  let note = '';
  const t = document.getElementById('tongue-color')?.value;
  const tc = document.getElementById('coating-color')?.value;
  const tq = document.getElementById('coating-quality')?.value;
  const ts = document.getElementById('tongue-shape')?.value;

  if (t === 'pale') note += '💡 淡白舌多主气血虚或阳虚，与虚证脉象相符。<br>';
  if (t === 'red' || t === 'crimson') note += '💡 红绛舌多主热证，与热象脉象一致。<br>';
  if (t === 'purple') note += '💡 紫舌多主血瘀或热极，注意血瘀倾向。<br>';
  if (tc === 'yellow') note += '💡 黄苔提示里热证。<br>';
  if (tq === 'greasy') note += '💡 腻苔提示湿浊或痰饮内停。<br>';
  if (tq === 'peeled' || tq === 'none') note += '💡 剥苔/无苔提示胃阴亏虚。<br>';
  if (ts === 'swollen' || ts === 'tooth') note += '💡 胖大/齿痕舌提示脾虚湿盛。<br>';
  if (ts === 'thin') note += '💡 瘦薄舌提示气血阴液不足。<br>';
  if (ts === 'cracked') note += '💡 裂纹舌提示热盛伤阴或阴虚。<br>';
  if (ts === 'ecchymosis') note += '💡 瘀斑舌提示体内有瘀血。<br>';

  return '<b>舌象概况：</b>' + lines.join('，') + '<br><br>' + (note || '');
}

function generateFormulas(syndromes) {
  if (syndromes.length === 0) return null;
  const matched = [];
  syndromes.forEach(s => {
    // Try exact match
    for (const [key, val] of Object.entries(FORMULA_DB)) {
      if (s.includes(key) && !matched.some(m => m.name === val.name)) {
        matched.push(val);
        if (matched.length >= 3) break;
      }
    }
    // Try partial match
    for (const [key, val] of Object.entries(FORMULA_DB)) {
      if (key.split(' / ').some(k => s.includes(k) || s.includes(key.split(' ')[0])) && !matched.some(m => m.name === val.name)) {
        if (!matched.includes(val)) matched.push(val);
        if (matched.length >= 3) break;
      }
    }
  });

  if (matched.length === 0) return null;

  return matched.map(m => `
    <div class="rec-card">
      <div class="rec-name">📜 ${m.name}</div>
      <div class="rec-comp">组成：${m.compose}</div>
      <div style="font-size:12px;">🍵 <b>食疗建议：</b>${m.food}</div>
    </div>
  `).join('');
}

function getPulseQuickRef(pulseTypes) {
  const unique = [...new Set(pulseTypes)];
  if (unique.length === 0) return null;
  return unique.map(pt => {
    const info = PULSE_DESC[pt];
    if (!info) return '';
    return `<div style="padding:8px 10px;background:var(--prim-bg);border-radius:8px;margin-bottom:6px;font-size:13px;line-height:1.6">
      <b style="color:var(--primary)">${info.name}</b> — ${info.feeling}<br>
      <span style="color:var(--text-light)">${info.desc}</span>
    </div>`;
  }).join('');
}
