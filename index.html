<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>脉诊分析助手 | 本味汤膳</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #C0392B;
    --primary-light: #E74C3C;
    --prim-bg: #FFF8F0;
    --accent: #E67E22;
    --card-bg: #FFF8F0;
    --text: #3E2723;
    --text-light: #6D4C41;
    --shadow: 0 2px 12px rgba(192,57,43,0.12);
    --radius: 14px;
    --green: #27AE60;
    --blue: #2980B9;
    --gold: #F39C12;
    --tag-bg: #F0E8E0;
    --tag-active: #C0392B;
  }
  body {
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    background: var(--prim-bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 100px;
  }
  .header {
    background: linear-gradient(135deg, #C0392B 0%, #E67E22 100%);
    color: #fff;
    text-align: center;
    padding: 18px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header .title { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
  .header .sub {
    font-size: 12px;
    opacity: .85;
    margin-top: 3px;
    letter-spacing: 2px;
  }
  .container { max-width: 640px; margin: 0 auto; padding: 16px; }

  /* ===== Patient Bar ===== */
  .patient-bar {
    background: #fff;
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .patient-bar .label { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; }
  .patient-bar select {
    flex: 1;
    min-width: 100px;
    padding: 7px 10px;
    border: 1.5px solid #E8D5C0;
    border-radius: 8px;
    font-size: 14px;
    background: #fff;
    color: var(--text);
    outline: none;
  }
  .patient-bar .btn-sm {
    padding: 7px 14px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s;
  }
  .patient-bar .btn-sm:active { transform: scale(.95); }
  .btn-sm.add { background: var(--green); color: #fff; }
  .btn-sm.del { background: #E8D5C0; color: var(--text); }
  .btn-sm.hist { background: var(--blue); color: #fff; }

  /* ===== Section Common ===== */
  .section-card {
    background: #fff;
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .section-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-title .badge {
    font-size: 11px;
    font-weight: 400;
    background: var(--prim-bg);
    color: var(--text-light);
    padding: 1px 10px;
    border-radius: 10px;
    margin-left: auto;
  }

  /* ===== Pulse Position Card (Composite) ===== */
  .hand-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .hand-title.left { color: var(--primary); }
  .hand-title.right { color: var(--blue); }

  .pulse-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .pulse-card {
    background: var(--prim-bg);
    border-radius: 10px;
    padding: 8px;
    text-align: center;
    border: 1.5px solid #E8D5C0;
  }
  .pulse-card .pos-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--primary);
    display: inline;
  }
  .pulse-card .pos-organ {
    font-size: 10px;
    color: var(--text-light);
    display: inline;
    margin-left: 4px;
  }

  /* Dim row */
  .dim-row {
    display: flex;
    align-items: center;
    gap: 3px;
    margin-top: 5px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .dim-row .dim-label {
    font-size: 10px;
    color: var(--text-light);
    min-width: 22px;
    text-align: right;
    flex-shrink: 0;
  }
  .dim-chip {
    display: inline-block;
    padding: 3px 7px;
    font-size: 11px;
    border-radius: 10px;
    background: var(--tag-bg);
    color: var(--text);
    border: 1px solid transparent;
    cursor: pointer;
    user-select: none;
    transition: all .12s;
    line-height: 1.3;
  }
  .dim-chip:active { transform: scale(.92); }
  .dim-chip.active {
    background: var(--tag-active);
    color: #fff;
    border-color: var(--tag-active);
  }
  .dim-chip.excl { /* mutually exclusive mode: highlight differently when toggled off is allowed */ }

  /* Pulse composite display */
  .pulse-result {
    margin-top: 6px;
    padding: 4px 8px;
    background: #fff;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    color: var(--primary);
    min-height: 24px;
    line-height: 1.5;
  }
  .pulse-result .empty-pulse { color: #ccc; font-weight: 400; font-size: 12px; }

  /* Quick set row */
  .quick-row {
    display: flex;
    gap: 4px;
    justify-content: center;
    margin-top: 5px;
  }
  .quick-row .q-chip {
    padding: 2px 10px;
    font-size: 11px;
    border-radius: 8px;
    background: #E8F5E9;
    color: #2E7D32;
    cursor: pointer;
    user-select: none;
    border: 1px solid #C8E6C9;
  }
  .quick-row .q-chip:active { transform: scale(.92); }
  .quick-row .q-clear {
    background: #FBE9E7;
    color: #BF360C;
    border-color: #FFCCBC;
  }

  /* ===== Tongue / Symptom Grids ===== */
  .sel-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .sel-item {
    background: var(--prim-bg);
    border-radius: 10px;
    padding: 10px 8px;
    border: 1.5px solid #E8D5C0;
  }
  .sel-item .sel-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 5px;
  }
  .sel-item select {
    width: 100%;
    padding: 5px 4px;
    border: 1.5px solid #E8D5C0;
    border-radius: 8px;
    font-size: 12px;
    background: #fff;
    color: var(--text);
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    text-align: center;
    text-align-last: center;
  }
  .sel-item select:focus { border-color: var(--accent); }

  /* ===== Symptoms Checkbox ===== */
  .symp-group {
    margin-bottom: 10px;
  }
  .symp-group .group-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .symp-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .symp-grid label {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 5px 10px;
    background: var(--prim-bg);
    border: 1.5px solid #E8D5C0;
    border-radius: 16px;
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
    user-select: none;
  }
  .symp-grid input[type="checkbox"] { display: none; }
  .symp-grid input:checked + span { color: #fff; }
  .symp-grid input:checked ~ span { color: inherit; }
  .symp-grid label:has(input:checked) {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }

  /* ===== Analyze ===== */
  .btn-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 8px 0 20px;
    flex-wrap: wrap;
  }
  .btn-analyze {
    padding: 14px 48px;
    border: none;
    border-radius: 28px;
    background: linear-gradient(135deg, #C0392B, #E67E22);
    color: #fff;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    box-shadow: 0 3px 12px rgba(192,57,43,0.3);
    letter-spacing: 2px;
    flex: 1;
    max-width: 260px;
  }
  .btn-analyze:active { transform: scale(.96); }
  .btn-reset {
    padding: 14px 24px;
    border: 1.5px solid #E8D5C0;
    border-radius: 28px;
    background: #fff;
    color: var(--text-light);
    font-size: 14px;
    cursor: pointer;
  }

  /* ===== Result ===== */
  .result-area { display: none; }
  .result-area.show { display: block; animation: fadeUp .3s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .result-section {
    background: #fff;
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
    border-left: 4px solid var(--accent);
  }
  .result-section.green { border-left-color: var(--green); }
  .result-section.blue { border-left-color: var(--blue); }
  .result-section h3 {
    font-size: 15px;
    color: var(--primary);
    margin-bottom: 6px;
  }
  .result-section .summary {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
  }
  .result-section .summary .tag {
    display: inline-block;
    padding: 1px 10px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
    margin: 2px 2px;
  }
  .tag.def { background: #E8F5E9; color: #2E7D32; }
  .tag.exc { background: #FBE9E7; color: #BF360C; }
  .tag.mix { background: #FFF3E0; color: #E65100; }

  .pos-analysis {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }
  .pos-analysis .item {
    padding: 8px 10px;
    background: var(--prim-bg);
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.6;
  }
  .pos-analysis .item .label { font-weight: 600; color: var(--primary); }

  .rec-card {
    padding: 10px 12px;
    background: var(--prim-bg);
    border-radius: 10px;
    margin-bottom: 8px;
    font-size: 13px;
    line-height: 1.6;
  }
  .rec-card .rec-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--primary);
  }
  .rec-card .rec-comp {
    font-size: 12px;
    color: var(--text-light);
    margin: 3px 0;
  }

  .empty-result {
    text-align: center;
    padding: 30px;
    color: var(--text-light);
  }
  .empty-result .icon { font-size: 36px; }

  .disclaimer {
    background: #FFF8E1;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12px;
    color: #8D6E63;
    line-height: 1.6;
    margin-top: 12px;
  }
  .disclaimer b { color: var(--primary); }

  /* ===== Modal ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: #fff;
    border-radius: 16px;
    padding: 20px;
    width: 90%;
    max-width: 360px;
    box-shadow: 0 8px 30px rgba(0,0,0,.2);
  }
  .modal-box h3 { font-size: 17px; margin-bottom: 14px; text-align: center; }
  .modal-box input, .modal-box select {
    width: 100%;
    padding: 10px;
    border: 1.5px solid #E8D5C0;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 10px;
    outline: none;
  }
  .modal-box input:focus { border-color: var(--primary); }
  .modal-btn-row { display: flex; gap: 10px; margin-top: 8px; }
  .modal-btn-row button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .modal-btn-row .ok { background: var(--primary); color: #fff; }
  .modal-btn-row .cancel { background: #E8D5C0; color: var(--text); }

  /* ===== History ===== */
  .history-list { max-height: 400px; overflow-y: auto; }
  .history-item {
    padding: 10px 12px;
    border-bottom: 1px solid #F0E0D0;
    font-size: 13px;
    line-height: 1.5;
  }
  .history-item:last-child { border: none; }
  .history-item .h-date { font-size: 11px; color: var(--text-light); }
  .history-item .h-summary { margin-top: 3px; }

  @media (max-width: 480px) {
    .pulse-grid { gap: 6px; }
    .pulse-card { padding: 6px; }
    .dim-chip { font-size: 10px; padding: 2px 5px; }
    .pos-analysis { grid-template-columns: 1fr; }
    .sel-grid { grid-template-columns: 1fr; }
    .patient-bar { flex-direction: column; align-items: stretch; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="title">🩺 脉诊分析助手</div>
  <div class="sub">辨脉象 · 看舌苔 · 问症状 · 知调养</div>
</div>

<div class="container">

  <!-- ===== Patient Bar ===== -->
  <div class="patient-bar">
    <span class="label">👤 患者</span>
    <select id="patientSelect" onchange="switchPatient(this.value)">
      <option value="__new">— 请选择或新建患者 —</option>
    </select>
    <button class="btn-sm add" onclick="showNewPatientModal()">➕ 新建</button>
    <button class="btn-sm del" onclick="deletePatient()">🗑️ 删除</button>
    <button class="btn-sm hist" onclick="showHistory()">📋 记录</button>
  </div>

  <!-- ===== Pulse Section ===== -->
  <div class="section-card" style="padding-bottom:8px;">
    <div class="section-title">
      <span>✋ 脉象诊断</span>
      <span class="badge">多维复合 · 点击维度标记</span>
    </div>
    <div style="font-size:11px;color:var(--text-light);margin-bottom:10px;">
      💡 每个脉位从多个维度选脉，自动合成复合脉（如"浮大有力""沉细涩"）
    </div>

    <!-- Left Hand -->
    <div class="hand-title left">✋ 左手</div>
    <div class="pulse-grid" id="leftGrid"></div>

    <!-- Right Hand -->
    <div class="hand-title right" style="margin-top:12px;">🤚 右手</div>
    <div class="pulse-grid" id="rightGrid"></div>
  </div>

  <!-- ===== Tongue Section ===== -->
  <div class="section-card">
    <div class="section-title">
      <span>👅 舌诊</span>
      <span class="badge">望舌辨症</span>
    </div>
    <div class="sel-grid">
      <div class="sel-item">
        <div class="sel-label">舌色</div>
        <select id="tongue-color">
          <option value="">— 未选 —</option>
          <option value="pale">淡白舌 (气血虚/阳虚)</option>
          <option value="light-red">淡红舌 (正常)</option>
          <option value="red">红舌 (热证)</option>
          <option value="crimson">绛舌 (热盛/阴虚火旺)</option>
          <option value="purple">紫舌 (血瘀/热极)</option>
          <option value="blue">青舌 (寒凝/血瘀)</option>
        </select>
      </div>
      <div class="sel-item">
        <div class="sel-label">苔色</div>
        <select id="coating-color">
          <option value="">— 未选 —</option>
          <option value="white">白苔 (表证/寒证)</option>
          <option value="yellow">黄苔 (热证/里证)</option>
          <option value="gray">灰苔 (里热/寒湿)</option>
          <option value="black">黑苔 (热极/寒极)</option>
        </select>
      </div>
    </div>
    <div class="sel-grid" style="margin-top:8px;">
      <div class="sel-item">
        <div class="sel-label">苔质</div>
        <select id="coating-quality">
          <option value="">— 未选 —</option>
          <option value="thin">薄苔 (正常/表证)</option>
          <option value="thick">厚苔 (里证/痰湿)</option>
          <option value="greasy">腻苔 (湿浊/痰饮)</option>
          <option value="dry">燥苔 (津亏/热盛)</option>
          <option value="moist">润苔 (正常/湿证)</option>
          <option value="peeled">剥苔 (胃气阴不足)</option>
          <option value="none">无苔 (胃阴大亏)</option>
        </select>
      </div>
      <div class="sel-item">
        <div class="sel-label">舌形</div>
        <select id="tongue-shape">
          <option value="">— 未选 —</option>
          <option value="normal">正常 (适中)</option>
          <option value="swollen">胖大舌 (阳虚水湿)</option>
          <option value="thin">瘦薄舌 (气血阴亏)</option>
          <option value="tooth">齿痕舌 (脾虚湿盛)</option>
          <option value="cracked">裂纹舌 (热盛/阴虚)</option>
          <option value="prickly">芒刺舌 (热盛)</option>
          <option value="ecchymosis">瘀斑舌 (血瘀)</option>
        </select>
      </div>
    </div>
  </div>

  <!-- ===== Symptoms Section ===== -->
  <div class="section-card">
    <div class="section-title">
      <span>💬 问诊 — 症状勾选</span>
      <span class="badge">可多选</span>
    </div>
    <div id="symptomsArea"></div>
  </div>

  <!-- ===== Actions ===== -->
  <div class="btn-row">
    <button class="btn-analyze" onclick="analyze()">🔍 综合分析</button>
    <button class="btn-reset" onclick="resetAll()">↺ 重置</button>
  </div>

  <!-- ===== Result ===== -->
  <div class="result-area" id="resultArea">
    <div id="resultContent"></div>
    <div class="disclaimer">
      <b>⚠️ 温馨提示：</b>脉诊分析仅供参考，不能替代专业中医师的四诊合参。
      如有身体不适，请及时到正规中医馆就诊。<br>
      🏪 <b>本味汤膳</b> — 辨体质 · 顺时节 · 知五味 · 养身心
    </div>
  </div>
</div>

<!-- ===== New Patient Modal ===== -->
<div class="modal-overlay" id="patientModal">
  <div class="modal-box">
    <h3>👤 新建患者</h3>
    <input id="newPatientName" placeholder="患者姓名" maxlength="20">
    <div style="display:flex;gap:8px;">
      <select id="newPatientGender" style="flex:1;">
        <option value="男">男</option>
        <option value="女">女</option>
      </select>
      <input id="newPatientAge" type="number" placeholder="年龄" min="0" max="120" style="flex:1;">
    </div>
    <div class="modal-btn-row">
      <button class="ok" onclick="createPatient()">✅ 确定</button>
      <button class="cancel" onclick="hideModal('patientModal')">取消</button>
    </div>
  </div>
</div>

<!-- ===== History Modal ===== -->
<div class="modal-overlay" id="historyModal">
  <div class="modal-box" style="max-width:500px;">
    <h3>📋 诊断记录</h3>
    <div id="historyContent" class="history-list"></div>
    <div class="modal-btn-row">
      <button class="cancel" onclick="hideModal('historyModal')" style="flex:1;">关闭</button>
    </div>
  </div>
</div>

<script>
// ======================== DIMENSION DEFINITIONS ========================

const DIM_DEFS = {
  depth: { label:'深', name:'深度',
    options: [
      { id:'fu', text:'浮', desc:'轻取即得' },
      { id:'zhong', text:'中', desc:'不浮不沉' },
      { id:'chen', text:'沉', desc:'重按始得' },
    ]
  },
  rate: { label:'速', name:'速率',
    options: [
      { id:'chi', text:'迟', desc:'<60次/分' },
      { id:'huan', text:'缓', desc:'~60次/分' },
      { id:'shuo', text:'数', desc:'>90次/分' },
      { id:'ji', text:'疾', desc:'>120次/分' },
    ]
  },
  width: { label:'宽', name:'宽度',
    options: [
      { id:'xi', text:'细', desc:'脉细如线' },
      { id:'normal', text:'中', desc:'大小适中' },
      { id:'da', text:'大', desc:'脉体宽大' },
    ]
  },
  force: { label:'力', name:'力度',
    options: [
      { id:'wuli', text:'无力', desc:'按之无' },
      { id:'youl', text:'有力', desc:'来去皆盛' },
    ]
  },
  flow: { label:'滑', name:'流利度',
    options: [
      { id:'hua', text:'滑', desc:'如珠走盘' },
      { id:'normal', text:'平', desc:'往来和缓' },
      { id:'se', text:'涩', desc:'艰涩不畅' },
    ]
  },
  tension: { label:'紧', name:'紧张度',
    options: [
      { id:'xian', text:'弦', desc:'如按琴弦' },
      { id:'jin', text:'紧', desc:'绷急有力' },
      { id:'ru', text:'濡', desc:'浮而细软' },
      { id:'normal', text:'和', desc:'不紧不弦' },
    ]
  },
  rhythm: { label:'律', name:'节律',
    options: [
      { id:'jie', text:'结', desc:'缓而时止' },

// ======================== BUILD PULSE CARDS ========================

const ALL_POS = ['left-cun','left-guan','left-chi','right-cun','right-guan','right-chi'];

function buildPulseCard(pos) {
  const info = ORGAN_MAP[pos];
  const hand = info.hand;
  const dims = POS_KNOW[pos];

  let html = `<div class="pulse-card" data-pos="${pos}">
    <div><span class="pos-name">${pos.includes('cun')?'寸':pos.includes('guan')?'关':'尺'} 脉</span>
    <span class="pos-organ">${info.organs}</span></div>`;

  DIM_ORDER.forEach(dim => {
    const def = DIM_DEFS[dim];
    if (!def) return;
    html += `<div class="dim-row">
      <span class="dim-label">${def.label}</span>`;
    def.options.forEach(opt => {
      const active = dims?.[dim]?.[opt.id] ? 'active' : '';
      html += `<span class="dim-chip ${active}" data-pos="${pos}" data-dim="${dim}" data-val="${opt.id}" onclick="toggleDim('${pos}','${dim}','${opt.id}')">${opt.text}</span>`;
    });
    html += `</div>`;
  });

  // Quick-set buttons
  html += `<div class="quick-row">
    <span class="q-chip" onclick="setPingmai('${pos}')">✅ 平脉</span>
    <span class="q-chip q-clear" onclick="clearPosition('${pos}')">✕ 清空</span>
  </div>`;

  // Composite result display
  html += `<div class="pulse-result" id="pr_${pos}"><span class="empty-pulse">— 未诊 —</span></div>`;
  html += `</div>`;
  return html;
}

function renderPulseCards() {
  const leftGrid = document.getElementById('leftGrid');
  const rightGrid = document.getElementById('rightGrid');
  leftGrid.innerHTML = ALL_POS.filter(p => ORGAN_MAP[p].hand === 'left').map(p => buildPulseCard(p)).join('');
  rightGrid.innerHTML = ALL_POS.filter(p => ORGAN_MAP[p].hand === 'right').map(p => buildPulseCard(p)).join('');
}

// ======================== PULSE STATE (in-memory) ========================

// pulseState[pos][dim] = val_id or null
let pulseState = {};
function initPulseState() {
  ALL_POS.forEach(pos => {
    pulseState[pos] = {};
    DIM_ORDER.forEach(dim => { pulseState[pos][dim] = null; });
  });
}

function toggleDim(pos, dim, val) {
  const current = pulseState[pos][dim];
  // If clicking same value, toggle off
  if (current === val) {
    pulseState[pos][dim] = null;
  } else {
    pulseState[pos][dim] = val;
  }
  updateChips(pos);
  updateComposite(pos);
}

function setPingmai(pos) {
  DIM_ORDER.forEach(dim => { pulseState[pos][dim] = null; });
  updateChips(pos);
  updateComposite(pos);
}

function clearPosition(pos) {
  setPingmai(pos);
}

function updateChips(pos) {
  const card = document.querySelector(`.pulse-card[data-pos="${pos}"]`);
  if (!card) return;
  card.querySelectorAll('.dim-chip').forEach(chip => {
    const dim = chip.dataset.dim;
    const val = chip.dataset.val;
    chip.classList.toggle('active', pulseState[pos][dim] === val);
  });
}

function getCompositeName(pos) {
  const parts = [];
  COMP_ORDER.forEach(dim => {
    const val = pulseState[pos][dim];
    if (!val) return;
    const def = DIM_DEFS[dim];
    if (!def) return;
    const opt = def.options.find(o => o.id === val);
    if (opt) parts.push(opt.text);
  });
  if (parts.length === 0) return '';
  return parts.join('');
}

function updateComposite(pos) {
  const el = document.getElementById('pr_' + pos);
  if (!el) return;
  const name = getCompositeName(pos);
  el.innerHTML = name
    ? `诊得：<b>${name}</b>`
    : '<span class="empty-pulse">✅ 平脉 / — 未诊 —</span>';
}

function getPatients() {
  try { return JSON.parse(localStorage.getItem('maizhen_patients')) || {}; } catch(e) { return {}; }
}
function savePatients(p) { localStorage.setItem('maizhen_patients', JSON.stringify(p)); }

function getHistory(pid) {
  try { return JSON.parse(localStorage.getItem('maizhen_hist_' + pid)) || []; } catch(e) { return []; }
}
function saveHistory(pid, h) { localStorage.setItem('maizhen_hist_' + pid, JSON.stringify(h)); }

function renderPatientList() {
  const sel = document.getElementById('patientSelect');
  const pts = getPatients();
  const current = sel.dataset.current || '';
  sel.innerHTML = '<option value="__new">— 请选择或新建患者 —</option>';
  Object.keys(pts).sort().forEach(id => {
    const p = pts[id];
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = p.name + (p.gender ? ' · ' + p.gender : '') + (p.age ? ' ' + p.age + '岁' : '');
    sel.appendChild(opt);
  });
  if (current && pts[current]) sel.value = current;
}
function switchPatient(id) {
  document.getElementById('patientSelect').dataset.current = id;
}

function getCurrentPatientId() {
  const v = document.getElementById('patientSelect').value;
  return v === '__new' ? null : v;
}
function getCurrentPatient() {
  const id = getCurrentPatientId();
  if (!id) return null;
  const pts = getPatients();
  return pts[id] || null;
}

function showNewPatientModal() {
  document.getElementById('patientModal').classList.add('show');
  document.getElementById('newPatientName').value = '';
  document.getElementById('newPatientAge').value = '';
}
function hideModal(id) { document.getElementById(id).classList.remove('show'); }

function createPatient() {
  const name = document.getElementById('newPatientName').value.trim();
  if (!name) { alert('请输入患者姓名'); return; }
  const gender = document.getElementById('newPatientGender').value;
  const age = document.getElementById('newPatientAge').value;
  const pts = getPatients();
  const id = 'p_' + Date.now();
  pts[id] = { name, gender, age: age || '', created: Date.now() };
  savePatients(pts);
  renderPatientList();
  document.getElementById('patientSelect').value = id;
  document.getElementById('patientSelect').dataset.current = id;
  hideModal('patientModal');
}

function deletePatient() {
  const id = getCurrentPatientId();
  if (!id) { alert('请先选择患者'); return; }
  const p = getCurrentPatient();
  if (!confirm('确定删除患者「' + p.name + '」及其所有诊断记录吗？')) return;
  const pts = getPatients();
  delete pts[id];
  savePatients(pts);
  localStorage.removeItem('maizhen_hist_' + id);
  renderPatientList();
}

function showHistory() {
  const id = getCurrentPatientId();
  if (!id) { alert('请先选择患者'); return; }
  const hist = getHistory(id);
  const el = document.getElementById('historyContent');

    el.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-light);font-size:14px;">暂无诊断记录</div>';

// ======================== ANALYZE ========================

function analyze() {
  // Check if any position has data
  const hasAny = ALL_POS.some(pos => getCompositeName(pos));
  if (!hasAny) {
    showResult('<div class="empty-result"><div class="icon">👆</div><p style="font-size:15px;line-height:1.6">请至少选择一个部位，点击脉象维度标记</p></div>');
    return;
  }

  let posDetails = '', allSyndromes = [], pulseRefs = [];
  let posSummaries = [];

  ALL_POS.forEach(pos => {
    const name = getCompositeName(pos);
    const info = ORGAN_MAP[pos];
    const dims = POS_KNOW[pos] || {};
    let posTags = [], posDescs = [];
    let hasDim = false;

    COMP_ORDER.forEach(dim => {
      const val = pulseState[pos][dim];
      if (!val) return;
      hasDim = true;
      // Try to find knowledge entry
      const know = dims[dim]?.[val];
      if (know) {
        know.tags.forEach(t => { if (!posTags.includes(t)) posTags.push(t); });
        posDescs.push(know.desc);
      }
      // Track for quick ref
      if (!pulseRefs.includes(val) && PULSE_REF[val]) pulseRefs.push(val);
    });

    if (!hasDim) {
      // No dims selected = considered normal/pingmai
      posSummaries.push(`${info.name}：平脉`);
      return;
    }

    const compositeStr = name || '平脉';
    const syndromeStr = posTags.length > 0 ? posTags.join('，') : '大致正常';

    posDetails += `<div class="item">
      <span class="label">${info.name}（${info.organs}）</span><br>
      <b style="color:var(--primary)">${compositeStr}</b><br>
      <span style="font-size:11px;color:#666">${posDescs.join(' ')}</span>
    </div>`;

    posTags.forEach(t => { if (!allSyndromes.includes(t)) allSyndromes.push(t); });
    posSummaries.push(`${info.name}：${compositeStr} → ${syndromeStr}`);
  });

  // ---- Tongue ----
  const tColor = document.getElementById('tongue-color');
  const tcColor = document.getElementById('coating-color');
  const tcQuality = document.getElementById('coating-quality');
  const tShape = document.getElementById('tongue-shape');
  const tongueData = {
    color: tColor.value ? tColor.options[tColor.selectedIndex].text : '',
    coating: tcColor.value ? tcColor.options[tcColor.selectedIndex].text : '',
    quality: tcQuality.value ? tcQuality.options[tcQuality.selectedIndex].text : '',
    shape: tShape.value ? tShape.options[tShape.selectedIndex].text : '',
  };

  // ---- Symptoms ----
  const symptoms = [];
  document.querySelectorAll('#symptomsArea input[type="checkbox"]:checked').forEach(c => symptoms.push(c.value));

  // ---- Generate ----
  const summary = generateSummary(allSyndromes, pulseRefs, tongueData, symptoms);
  const formulas = generateFormulas(allSyndromes);
  const quickRef = getPulseQuickRef(pulseRefs);

  let html = `
    <div class="result-section">
      <h3>📊 综合分析</h3>
      <div class="summary">${summary}</div>
    </div>`;

  if (posDetails) {
    html += `<div class="result-section">
      <h3>🔬 各部位脉象分析</h3>
      <div class="pos-analysis">${posDetails}</div>
    </div>`;
  }

  if (tongueData.color || tongueData.coating || tongueData.quality || tongueData.shape) {
    html += `<div class="result-section">
      <h3>👅 舌诊参考</h3>
      <div class="summary">${renderTongueAnalysis(tongueData)}</div>
    </div>`;
  }

  if (symptoms.length > 0) {
    html += `<div class="result-section">
      <h3>💬 问诊 — 已选症状</h3>
      <div class="summary">${symptoms.map(s => `<span class="tag" style="background:#FBE9E7;color:#BF360C">${s}</span>`).join(' ')}</div>
    </div>`;
  }

  if (formulas) {
    html += `<div class="result-section green">
      <h3>🏪 调养方案推荐</h3>
      ${formulas}
      <div style="margin-top:10px;font-size:12px;color:var(--text-light);background:#FFF3E0;padding:10px;border-radius:8px;">
        💡 <b>食疗提示：</b>以上药膳建议可配合「本味汤膳」小程序查询具体制作方法。<br>
        ⚠️ 方剂仅供参考，实际用药请遵医嘱。
      </div>
    </div>`;
  }

  if (quickRef) {
    html += `<div class="result-section blue">
      <h3>📋 脉象速查</h3>
      ${quickRef}
    </div>`;
  }

  showResult(html);

  // ---- Save history ----
  const pid = getCurrentPatientId();
  if (pid) {
    const hist = getHistory(pid);
    const pulseSummary = ALL_POS.map(pos => {
      const n = getCompositeName(pos);
      return n ? `${ORGAN_MAP[pos].name}:${n}` : null;
    }).filter(Boolean).join('；');
    hist.push({
      time: Date.now(),
      pulseStr: pulseSummary || '平脉',
      summary: allSyndromes.length > 0 ? allSyndromes.slice(0,4).join('；') : '',
      tongue: tongueData,
      symptoms: symptoms
    });
    if (hist.length > 100) hist.splice(0, hist.length - 100);
    saveHistory(pid, hist);
  }
}

function showResult(html) {
  document.getElementById('resultContent').innerHTML = html;
  document.getElementById('resultArea').classList.add('show');
  document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ======================== GENERATE SUMMARY ========================

function generateSummary(syndromes, pulseRefs, tongue, symptoms) {
  if (syndromes.length === 0) {
    return '✅ <b>结论：</b>脉象平和，属正常脉象，提示气血调和、五脏安定。' +
      (tongue.color ? '<br>👅 舌象信息可供参考。' : '') +
      (symptoms.length > 0 ? '<br>💬 如有不适症状，建议结合更多诊法综合判断。' : '');
  }

  const defPatterns = ['虚','亏','衰','弱','不足','少'];
  const excPatterns = ['实','盛','亢','火','热','滞','瘀','痰','湿','寒','郁','风','结','阻'];

  let defCount = 0, excCount = 0;
  syndromes.forEach(s => {
    if (defPatterns.some(p => s.includes(p))) defCount++;
    if (excPatterns.some(p => s.includes(p))) excCount++;
  });

  const tVal = document.getElementById('tongue-color')?.value;
  if (tVal === 'pale') defCount += 2;
  if (tVal === 'red' || tVal === 'crimson') excCount += 2;
  if (tVal === 'purple') excCount += 1;
  const tcVal = document.getElementById('coating-color')?.value;
  if (tcVal === 'yellow') excCount += 1;
  if (tcVal === 'black') excCount += 2;
  const tShapeVal = document.getElementById('tongue-shape')?.value;
  if (tShapeVal === 'swollen' || tShapeVal === 'tooth') defCount += 1;
  if (tShapeVal === 'thin') defCount += 2;

  let conclusion = '', tagClass = '';
  if (defCount > excCount && defCount >= 2) {
    conclusion = '总体以<b>虚证</b>为主，提示脏腑气血阴阳有所不足。建议以扶正补益、调养休息为主，配合对应体质的药膳调理。';
    tagClass = 'def';
  } else if (excCount > defCount && excCount >= 2) {
    conclusion = '总体以<b>实证</b>为主，提示体内有邪气停留（热、湿、痰、瘀、寒等）。建议饮食清淡，忌辛辣油腻，必要时请中医师辨证施治。';
    tagClass = 'exc';
  } else if (defCount > 0 && excCount > 0) {
    conclusion = '总体呈<b>虚实夹杂</b>之象，既有正气不足，又有邪气留滞。需攻补兼施，建议到中医馆面诊。';
    tagClass = 'mix';
  } else {
    conclusion = '脉象存在一定偏差，建议结合舌诊、问诊综合判断。';
  }

  let patternNote = '';
  if (pulseRefs.includes('xian')) patternNote += '⚠️ 弦脉出现，注意<b>情绪管理</b>，避免恼怒焦虑。<br>';
  if (pulseRefs.includes('hua')) patternNote += '⚠️ 滑脉出现，注意<b>饮食清淡</b>，避免肥甘厚味。<br>';
  if (pulseRefs.includes('xi') || pulseRefs.includes('ruo')) patternNote += '⚠️ 细弱脉提示<b>气血不足</b>，注意休息调养。<br>';

  if (symptoms.includes('失眠') && pulseRefs.includes('shuo')) patternNote += '📌 失眠+数脉，提示心火或阴虚内热扰动心神。<br>';
  if (symptoms.includes('乏力') && (pulseRefs.includes('xi'))) patternNote += '📌 乏力+细脉，符合气血不足表现。<br>';

  return `
    涉及证型：${syndromes.join('、')}<br><br>
    🔹 <b>性质判断：</b><span class="tag ${tagClass}">${tagClass === 'def' ? '虚证' : tagClass === 'exc' ? '实证' : tagClass === 'mix' ? '虚实夹杂' : '偏颇'}</span><br>
    ${conclusion}<br>
    ${patternNote ? '<br>' + patternNote : ''}
  `;
}

function renderTongueAnalysis(tongue) {
  let lines = [];
  if (tongue.color) lines.push('舌色：' + tongue.color);
  if (tongue.coating) lines.push('苔色：' + tongue.coating);
  if (tongue.quality) lines.push('苔质：' + tongue.quality);
  if (tongue.shape) lines.push('舌形：' + tongue.shape);
  let note = '';
  const t = document.getElementById('tongue-color')?.value;
  const tc = document.getElementById('coating-color')?.value;
  const tq = document.getElementById('coating-quality')?.value;
  const ts = document.getElementById('tongue-shape')?.value;
  if (t === 'pale') note += '💡 淡白舌多主气血虚或阳虚。<br>';
  if (t === 'red' || t === 'crimson') note += '💡 红绛舌多主热证。<br>';
  if (t === 'purple') note += '💡 紫舌多主血瘀或热极。<br>';
  if (tc === 'yellow') note += '💡 黄苔提示里热证。<br>';
  if (tq === 'greasy') note += '💡 腻苔提示湿浊或痰饮内停。<br>';
  if (tq === 'peeled' || tq === 'none') note += '💡 剥苔/无苔提示胃阴亏虚。<br>';
  if (ts === 'swollen' || ts === 'tooth') note += '💡 胖大/齿痕舌提示脾虚湿盛。<br>';
  if (ts === 'thin') note += '💡 瘦薄舌提示气血阴液不足。<br>';
  if (ts === 'cracked') note += '💡 裂纹舌提示热盛伤阴。<br>';
  if (ts === 'ecchymosis') note += '💡 瘀斑舌提示体内有瘀血。<br>';
  return '<b>舌象概况：</b>' + lines.join('，') + '<br><br>' + (note || '');
}

function generateFormulas(syndromes) {
  if (syndromes.length === 0) return null;
  const matched = [];
  // Try matching syndromes to formula DB keys
  const allFormulaKeys = Object.keys(FORMULA_DB);
  syndromes.forEach(s => {
    for (const key of allFormulaKeys) {
      if (key.split(' / ').some(k => s.includes(k)) && !matched.some(m => m.name === FORMULA_DB[key].name)) {
        matched.push(FORMULA_DB[key]);
        if (matched.length >= 3) break;
      }
    }
  });
  if (matched.length === 0) {
    // Try broader match
    syndromes.forEach(s => {
      for (const [key, val] of Object.entries(FORMULA_DB)) {
        if (key.includes(s.slice(0,2)) && !matched.some(m => m.name === val.name)) {
          matched.push(val);
          if (matched.length >= 2) break;
        }
      }
    });
  }
  if (matched.length === 0) return null;
  return matched.map(m => `
    <div class="rec-card">
      <div class="rec-name">📜 ${m.name}</div>
      <div class="rec-comp">组成：${m.compose}</div>
      <div style="font-size:12px;color:var(--primary);">💊 <b>用法：</b>${m.dose}</div>
      <div style="font-size:12px;margin-top:3px;">🍵 <b>食疗建议：</b>${m.food}</div>
    </div>
  `).join('');
}

function getPulseQuickRef(refs) {
  const unique = [...new Set(refs)];
  if (unique.length === 0) return null;
  return unique.map(pt => {
    const info = PULSE_REF[pt];
    if (!info) return '';
    return `<div style="padding:8px 10px;background:var(--prim-bg);border-radius:8px;margin-bottom:6px;font-size:13px;line-height:1.6">
      <b style="color:var(--primary)">${info.name}</b> — ${info.feeling}<br>
      <span style="color:var(--text-light)">${info.desc}</span>
    </div>`;
  }).join('');
}

// ======================== INIT ========================

initPulseState();
renderPulseCards();
initSymptoms();
renderPatientList();
</script>
